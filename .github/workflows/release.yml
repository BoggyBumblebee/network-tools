name: Release

on:
  workflow_dispatch:

jobs:
  developer-id-release:
    runs-on: macos-latest
    env:
      CERTIFICATE_PATH: /tmp/network-tools-developer-id.p12
      KEYCHAIN_PATH: /tmp/network-tools-release.keychain-db
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
      NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
      NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
      NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode Developer ID Certificate
        run: |
          echo "${{ secrets.DEVELOPER_ID_CERTIFICATE_P12_BASE64 }}" | base64 -D > "$CERTIFICATE_PATH"

      - name: Create Temporary Keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build, Notarize, and Staple
        run: |
          chmod +x scripts/release-developer-id.sh
          scripts/release-developer-id.sh

      - name: Upload Notarized App
        uses: actions/upload-artifact@v4
        with:
          name: NetworkTools-notarized-app
          path: /tmp/NetworkToolsReleaseExport/NetworkTools.app
