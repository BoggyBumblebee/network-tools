name: NetworkTools
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 15.0
targets:
  NetworkTools:
    type: application
    platform: macOS
    deploymentTarget: 15.0
    sources:
      - path: NetworkTools/Sources
      - path: NetworkTools/Resources/Assets.xcassets
        buildPhase: resources
      - path: NetworkTools/Resources/Assets
        buildPhase: resources
      - path: NetworkTools/Resources/Help
        buildPhase: resources
    info:
      path: NetworkTools/Resources/Info.plist
      properties:
        CFBundleDisplayName: Network Tools
        CFBundleName: Network Tools
        CFBundleIdentifier: com.boggybumblebee.NetworkTools
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        NSHumanReadableCopyright: "Copyright (c) 2026 BoggyBumblebee. All rights reserved."
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boggybumblebee.NetworkTools
        PRODUCT_NAME: NetworkTools
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  NetworkToolsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: 15.0
    sources:
      - path: NetworkTools/Tests
    dependencies:
      - target: NetworkTools
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boggybumblebee.NetworkToolsTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NetworkTools.app/Contents/MacOS/NetworkTools"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  NetworkTools:
    build:
      targets:
        NetworkTools: all
        NetworkToolsTests: [test]
    test:
      targets:
        - NetworkToolsTests
